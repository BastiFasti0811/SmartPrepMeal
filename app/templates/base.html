<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SmartMeal Weekly Planner{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Direkt zum Inhalt</a>
  <header class="site-header">
    <div class="wrap">
      <h1>SmartMeal Weekly Planner</h1>
      <p>Woechentliche Essensplanung mit Angebotsfokus, Familien-Budget und No-Pork-Regel.</p>
    </div>
  </header>
  <main id="main-content" class="wrap">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
